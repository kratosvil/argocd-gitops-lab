apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratosvil-replica-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kratosvil/saga-gitops-manifests.git
    targetRevision: main
    path: overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: kratosvil-replica-app-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

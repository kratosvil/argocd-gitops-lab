apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratosvil-replica-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kratosvil/saga-gitops-manifests.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kratosvil-replica-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saga-observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kratosvil/argocd-gitops-aws.git
    targetRevision: main
    path: observability/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

name: Build and promote (dev)

# Only app source changes trigger a build. The promotion commit goes to a
# separate private repo (saga-gitops-manifests), so it can never re-trigger
# this workflow — no loop guard needed anymore.
on:
  push:
    branches: [main]
    paths:
      - "app/kratosvil-replica-app/**"
  workflow_dispatch: {} # manual re-run without touching app files

permissions:
  contents: read     # this repo is read-only for this job now

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 805778285334.dkr.ecr.us-east-1.amazonaws.com/kratosvil-replica-app
  KUSTOMIZE_VERSION: 5.4.3

jobs:
  build-push-promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      # TEMPORARY: static credentials, not OIDC. This AWS account is on the
      # $200 Free Trial tier and appears to block external OIDC federation
      # (AssumeRoleWithWebIdentity fails with a generic AccessDenied despite
      # a verified-correct trust policy — undocumented by AWS, consistent
      # with the account's other undocumented Free-Tier-only restrictions).
      # The OIDC role/provider are still provisioned (terraform/iam/main.tf)
      # — switch back to role-to-assume once the account is verified/
      # upgraded, and delete terraform/iam/fallback_ci_user.tf.
      - name: Configure AWS credentials (static, temporary)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        working-directory: app/kratosvil-replica-app
        run: |
          tag="${GITHUB_SHA::12}"
          docker build -t "${ECR_REPOSITORY}:${tag}" .
          docker push "${ECR_REPOSITORY}:${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # Manifests live in a separate private repo (SAGA Módulo 1: keeps live
      # operational state — account IDs, ARNs — out of this public repo).
      # Fine-grained PAT scoped only to that repo, Contents+PRs Read&Write.
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: kratosvil/saga-gitops-manifests
          token: ${{ secrets.SAGA_MANIFESTS_TOKEN }}
          path: manifests

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Bump dev image tag
        working-directory: manifests/overlays/dev
        run: |
          kustomize edit set image "${ECR_REPOSITORY}=${ECR_REPOSITORY}:${{ steps.build.outputs.tag }}"

      - name: Commit and push
        working-directory: manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/kustomization.yaml
          git commit -m "ci: promote dev to ${{ steps.build.outputs.tag }}"
          git push

